# Sprint {{sprint_number}} - Migrated
# Generated by migrate-to-multi-sprint workflow

sprint_number: {{sprint_number}}
status: {{status}}  # completed, active

dates:
  start: {{start_date}}
  target_end: {{target_end_date}}
  actual_end: {{actual_end_date}}  # null if active

team:
{{#each team_members}}
  - {{.}}
{{/each}}

planned_stories:
{{#each stories}}
  - key: {{key}}
    epic: {{epic_number}}
    epic_title: "{{epic_title}}"
    title: "{{title}}"
    points: {{points}}
    status: {{status}}  # done, in-progress, planned
    assignee: {{assignee}}  # null if unknown
    jira_key: null
    source_file: planning-artifacts/epics/epic-{{epic_number}}.md
{{/each}}

metrics:
  total_points: {{total_points}}
  completed_points: {{completed_points}}
  stories_by_epic:
{{#each epic_counts}}
    epic-{{epic_num}}: {{count}}
{{/each}}

# Change history - approved sprint change proposals created during this sprint
# Note: Proposals may affect stories that weren't in this sprint yet
change_history:
{{#each change_proposals}}
  - date: {{date}}
    proposal: planning-artifacts/{{filename}}
    summary: "{{summary}}"
    scope: {{scope}}  # in-sprint, backlog, mixed, or future-epic
    affected_in_sprint: {{affected_in_sprint}}  # stories that were in this sprint
    affected_backlog: {{affected_backlog}}  # stories not yet in any sprint
{{/each}}

retro_completed: {{retro_completed}}
