# Velocity Log
# Tracks sprint velocity for capacity planning
# Generated by migrate-to-multi-sprint workflow

sprints:
{{#each sprints}}
  - number: {{number}}
    total_points: {{total_points}}
    completed_points: {{completed_points}}
    velocity: {{completed_points}}
    dates:
      start: {{start_date}}
      end: {{end_date}}
{{/each}}

averages:
  last_3_sprints: {{avg_last_3}}
  all_time: {{avg_all_time}}

# Notes:
# - Velocity = completed story points
# - Use last_3_sprints average for sprint planning
# - Update manually if averages seem off
