# Sprint Backlog Template
# Generated by sprint-planning workflow

sprint_number: {{sprint_number}}
status: active  # active | completed | cancelled

dates:
  start: {{start_date}}
  target_end: {{target_end_date}}
  actual_end: null  # populated when sprint closes

team:
  - name: {{team_member_1}}
  - name: {{team_member_2}}

# Stories selected from multiple epics
planned_stories:
  - key: 1-1-example-story
    epic: 1
    epic_title: "Example Epic"
    title: "Example Story"
    points: 5
    status: planned  # planned | in-progress | review | done
    assignee: null
    jira_key: null   # optional Jira link
    source_file: "implementation-artifacts/1-1-example-story.md"

# Status Definitions:
# ===================
# Sprint Status:
#   - active: Sprint is in progress
#   - completed: Sprint finished, review done
#   - cancelled: Sprint cancelled
#
# Story Status:
#   - planned: Story selected for sprint, not yet started
#   - in-progress: Developer actively working
#   - review: Ready for code review
#   - done: Story completed and accepted
#
# Sprint Flow:
#   1. Stories start as 'planned'
#   2. Developer picks up story → 'in-progress'
#   3. Implementation done → 'review'
#   4. Code review passed → 'done'
#   5. All stories done → run sprint-review

metrics:
  total_points: 0
  completed_points: 0
  stories_by_epic:
    epic-1: 0

carryover: []  # Stories moved to next sprint
retro_completed: false
review_file: null
