# Sprint {{sprint_number}}
# Generated by BMAD sprint-planning workflow

sprint_number: {{sprint_number}}
status: active

dates:
  start: {{start_date}}
  target_end: {{target_end_date}}
  actual_end: null

team:
{{#each team_members}}
  - name: {{this}}
{{/each}}

planned_stories:
{{#each selected_stories}}
  - key: {{story_key}}
    epic: {{epic_number}}
    epic_title: "{{epic_title}}"
    title: "{{story_title}}"
    points: {{story_points}}
    status: planned
    assignee: null
    jira_key: null
    source_file: "implementation-artifacts/{{story_key}}.md"
{{/each}}

metrics:
  total_points: {{total_points}}
  completed_points: 0
  stories_by_epic:
{{#each epic_counts}}
    epic-{{epic_number}}: {{story_count}}
{{/each}}

carryover: []
retro_completed: false
